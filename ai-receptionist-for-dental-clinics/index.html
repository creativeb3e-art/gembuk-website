<script>
    document.getElementById('gembukDemoForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const btn = document.getElementById('submitBtn');
      const status = document.getElementById('formStatus');
      const email = document.getElementById('email').value;
      const confirmEmail = document.getElementById('confirmEmail').value;

      // 1. Email matching check
      if (email !== confirmEmail) {
        status.textContent = "Emails do not match!";
        status.style.color = "#ff4d4d";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Sending...";

      // 2. reCAPTCHA v3 Logic
      grecaptcha.ready(function() {
        grecaptcha.execute('6Lf1YIUsAAAAABPzDdDel67Mk4N2O8_xf3_rEeUO', {action: 'submit'}).then(function(token) {
          
          const formData = {
            clinicName: document.getElementById('clinicName').value,
            fullName: document.getElementById('fullName').value,
            email: email,
            phone: document.getElementById('phone').value,
            captchaToken: token
          };

          // 3. Send to your NEW Google Apps Script Deployment
          fetch('https://script.google.com/macros/s/AKfycbxMd0RLzTsnia6xXv0Zh09slEYu8K4R_lwilS0Fj3criXrMA97lOPH7xWsd6BD8EGwC/exec', {
            method: 'POST',
            body: JSON.stringify(formData)
          })
          .then(res => {
            // Success Path
            status.textContent = "Success! Please check your email.";
            status.style.color = "#f3c84b";
            document.getElementById('gembukDemoForm').reset();
            btn.textContent = "Sent!";
          })
          .catch(err => {
            // Error Path
            console.error("Submission error:", err);
            status.textContent = "Error sending. Please try again.";
            btn.disabled = false;
            btn.textContent = "Send Demo Instructions";
          });
        });
      });
    });
  </script>
</body>
</html>
